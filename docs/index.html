<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pipeline Analytics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

  header { padding: 20px 28px 14px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  h1 { font-size: 1.3rem; font-weight: 700; }
  .meta { color: #444; font-size: .75rem; margin-top: 3px; }

  .toggle { background: #1a1a1a; border-radius: 8px; display: flex; padding: 3px; gap: 3px; }
  .toggle button { background: transparent; border: none; color: #666; font-size: .85rem; padding: 6px 18px; border-radius: 6px; cursor: pointer; transition: all .15s; font-family: inherit; }
  .toggle button.active { background: #2a2a2a; color: #e0e0e0; }

  .chart-section { flex: 1; padding: 0 24px 10px; display: flex; flex-direction: column; min-height: 0; }
  .chart-container { flex: 1; background: #1a1a1a; border-radius: 14px; padding: 20px; position: relative; min-height: 380px; }

  .legend { display: flex; flex-wrap: wrap; gap: 10px 20px; padding: 14px 28px; flex-shrink: 0; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: .85rem; color: #aaa; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .subs-row { display: flex; gap: 10px; padding: 4px 24px 24px; flex-wrap: wrap; flex-shrink: 0; }
  .subs-card { background: #1a1a1a; border-radius: 10px; padding: 12px 16px; flex: 1; min-width: 110px; border-top: 3px solid; }
  .game-name { font-size: .65rem; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
  .subs-val { font-size: 1.6rem; font-weight: 700; }
  .subs-lbl { font-size: .65rem; color: #555; margin-top: 2px; }

  .no-data { color: #444; font-size: .9rem; text-align: center; padding: 60px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Pipeline Analytics</h1>
    <p class="meta">Mis à jour le 2026-05-23 19:17 UTC</p>
  </div>
  <div class="toggle">
    <button id="btn-shorts" class="active" onclick="switchMode('shorts')">Shorts</button>
    <button id="btn-longs" onclick="switchMode('longs')">Vidéos</button>
  </div>
</header>

<div class="chart-section">
  <div class="chart-container">
    
    <canvas id="mainChart"></canvas>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#FF9F0A"></div><span>Apex Legends</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#BF5AF2"></div><span>Rainbow Six Siege</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#0A84FF"></div><span>Rocket League</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#FF3B30"></div><span>Valorant</span></div>
</div>

<div class="subs-row">
  <div class="subs-card" style="border-top-color:#FF9F0A"><div class="game-name" style="color:#FF9F0A">Apex Legends</div><div class="subs-val">—</div><div class="subs-lbl">abonnés</div></div>
  <div class="subs-card" style="border-top-color:#BF5AF2"><div class="game-name" style="color:#BF5AF2">Rainbow Six Siege</div><div class="subs-val">2</div><div class="subs-lbl">abonnés</div></div>
  <div class="subs-card" style="border-top-color:#0A84FF"><div class="game-name" style="color:#0A84FF">Rocket League</div><div class="subs-val">1</div><div class="subs-lbl">abonnés</div></div>
  <div class="subs-card" style="border-top-color:#FF3B30"><div class="game-name" style="color:#FF3B30">Valorant</div><div class="subs-val">342</div><div class="subs-lbl">abonnés</div></div>
</div>

<script>
const shortsData = {"labels": ["2026-05-18", "2026-05-19", "2026-05-20", "2026-05-21"], "datasets": [{"label": "Apex Legends", "data": [null, 98, 0, null], "borderColor": "#FF9F0A", "backgroundColor": "#FF9F0A22", "borderWidth": 2.5, "pointBackgroundColor": "#FF9F0A", "pointRadius": 4, "pointHoverRadius": 7, "tension": 0.3, "fill": false, "spanGaps": true}, {"label": "Rainbow Six Siege", "data": [null, 1237, 1389, null], "borderColor": "#BF5AF2", "backgroundColor": "#BF5AF222", "borderWidth": 2.5, "pointBackgroundColor": "#BF5AF2", "pointRadius": 4, "pointHoverRadius": 7, "tension": 0.3, "fill": false, "spanGaps": true}, {"label": "Rocket League", "data": [null, 251, 0, null], "borderColor": "#0A84FF", "backgroundColor": "#0A84FF22", "borderWidth": 2.5, "pointBackgroundColor": "#0A84FF", "pointRadius": 4, "pointHoverRadius": 7, "tension": 0.3, "fill": false, "spanGaps": true}, {"label": "Valorant", "data": [0, 251, 0, 1], "borderColor": "#FF3B30", "backgroundColor": "#FF3B3022", "borderWidth": 2.5, "pointBackgroundColor": "#FF3B30", "pointRadius": 4, "pointHoverRadius": 7, "tension": 0.3, "fill": false, "spanGaps": true}]};
const longsData  = {"labels": ["2026-05-18", "2026-05-19", "2026-05-21"], "datasets": [{"label": "Apex Legends", "data": [null, 0, null], "borderColor": "#FF9F0A", "backgroundColor": "#FF9F0A22", "borderWidth": 2.5, "pointBackgroundColor": "#FF9F0A", "pointRadius": 4, "pointHoverRadius": 7, "tension": 0.3, "fill": false, "spanGaps": true}, {"label": "Rainbow Six Siege", "data": [null, 18, null], "borderColor": "#BF5AF2", "backgroundColor": "#BF5AF222", "borderWidth": 2.5, "pointBackgroundColor": "#BF5AF2", "pointRadius": 4, "pointHoverRadius": 7, "tension": 0.3, "fill": false, "spanGaps": true}, {"label": "Rocket League", "data": [null, 2, null], "borderColor": "#0A84FF", "backgroundColor": "#0A84FF22", "borderWidth": 2.5, "pointBackgroundColor": "#0A84FF", "pointRadius": 4, "pointHoverRadius": 7, "tension": 0.3, "fill": false, "spanGaps": true}, {"label": "Valorant", "data": [2, 2, 3], "borderColor": "#FF3B30", "backgroundColor": "#FF3B3022", "borderWidth": 2.5, "pointBackgroundColor": "#FF3B30", "pointRadius": 4, "pointHoverRadius": 7, "tension": 0.3, "fill": false, "spanGaps": true}]};

let currentChart = null;

function buildChart(data) {
  if (currentChart) currentChart.destroy();
  const ctx = document.getElementById('mainChart').getContext('2d');
  currentChart = new Chart(ctx, {
    type: 'line',
    data: data,
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'nearest', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1c1c1c',
          borderColor: '#333',
          borderWidth: 1,
          titleColor: '#888',
          bodyColor: '#e0e0e0',
          padding: 12,
          boxPadding: 6,
          callbacks: {
            title: (items) => items[0]?.label || '',
            label: (item) => {
              const v = item.parsed.y;
              if (v === null || v === undefined) return null;
              return '  ' + item.dataset.label + '  —  ' + v.toLocaleString('fr-FR') + ' vues';
            },
            filter: (item) => item.parsed.y !== null && item.parsed.y !== undefined,
          },
        },
      },
      scales: {
        x: {
          ticks: { color: '#555', font: { size: 11 } },
          grid: { color: '#1e1e1e' },
        },
        y: {
          ticks: { color: '#555', font: { size: 11 } },
          grid: { color: '#1e1e1e' },
          beginAtZero: true,
        },
      },
    },
  });
}

function switchMode(mode) {
  document.getElementById('btn-shorts').classList.toggle('active', mode === 'shorts');
  document.getElementById('btn-longs').classList.toggle('active', mode === 'longs');
  buildChart(mode === 'shorts' ? shortsData : longsData);
}

window.addEventListener('load', () => buildChart(shortsData));
</script>
</body>
</html>
