name: Daily Compilation

on:
  workflow_dispatch:        # déclenchement manuel depuis GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          sudo apt-get install -y ffmpeg fonts-dejavu
          pip install -r requirements.txt

      - name: Restore used clips history
        uses: actions/cache@v4
        with:
          path: data/used_clips.json
          key: used-clips-${{ github.run_id }}
          restore-keys: used-clips-

      - name: Create output dirs
        run: mkdir -p output/long output/shorts output/tiktok data logs

      - name: Run pipeline
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GAMES: ${{ vars.GAMES }}
          CLIPS_PER_VIDEO: ${{ vars.CLIPS_PER_VIDEO }}
          MIN_VELOCITY: ${{ vars.MIN_VELOCITY }}
          CLIPS_DAYS_AGO_START: ${{ vars.CLIPS_DAYS_AGO_START }}
          CLIPS_DAYS_AGO_END: ${{ vars.CLIPS_DAYS_AGO_END }}
          MIN_CLIP_DURATION: ${{ vars.MIN_CLIP_DURATION }}
          MAX_CLIP_DURATION: ${{ vars.MAX_CLIP_DURATION }}
          EXCLUDED_LANGUAGES: ${{ vars.EXCLUDED_LANGUAGES }}
        run: python3 -c "
import logging
logging.basicConfig(level=logging.INFO, format='%(asctime)s [%(levelname)s] %(message)s')
from src.fetch_clips import fetch_top_clips
from src.download_clips import download_clips
from src.fetch_clips import mark_clips_used
from src.process_long import build_long_video
from src.process_short import build_shorts, build_tiktok

clips = fetch_top_clips()
for i, c in enumerate(clips, 1):
    print(f'{i:2}. [{c[\"_game\"]:<22}] {c[\"title\"]}')

downloaded = download_clips(clips)
mark_clips_used(downloaded)

build_long_video(downloaded)
build_shorts(downloaded[:3])
build_tiktok(downloaded[0])
"

      - name: Upload compilation (long)
        uses: actions/upload-artifact@v4
        with:
          name: compilation-long-${{ github.run_id }}
          path: output/long/*.mp4
          retention-days: 7

      - name: Upload shorts
        uses: actions/upload-artifact@v4
        with:
          name: compilation-shorts-${{ github.run_id }}
          path: output/shorts/*.mp4
          retention-days: 7

      - name: Upload tiktok
        uses: actions/upload-artifact@v4
        with:
          name: compilation-tiktok-${{ github.run_id }}
          path: output/tiktok/*.mp4
          retention-days: 7
