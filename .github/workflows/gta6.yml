name: GTA 6 Content Pipeline

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Angle/sujet à privilégier (laisser vide pour auto)"
        required: false
        default: ""
      skip_long:
        description: "Passer la vidéo longue (plus rapide)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run GTA 6 pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            ARGS="--topic '${{ github.event.inputs.topic }}'"
          fi
          if [ "${{ github.event.inputs.skip_long }}" = "true" ]; then
            ARGS="$ARGS --no-long"
          fi
          python run_gta6.py $ARGS

      - name: Commit topic history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gta6_topics.json 2>/dev/null || true
          git diff --cached --quiet && exit 0
          git commit -m "chore: update GTA6 topic history"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Retry $i..."
            git rebase --abort 2>/dev/null || true
            sleep $((i * 5))
          done

      - name: Upload videos
        uses: actions/upload-artifact@v4
        with:
          name: gta6-content-${{ github.run_id }}
          path: output/gta6/
          retention-days: 14
