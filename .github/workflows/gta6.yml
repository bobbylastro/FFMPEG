name: GTA 6 Content Pipeline

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Angle/sujet à privilégier (laisser vide pour auto)"
        required: false
        default: ""
      with_long:
        description: "Générer aussi la vidéo longue (passée par défaut, y compris via cron)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run GTA 6 pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            ARGS="--topic '${{ github.event.inputs.topic }}'"
          fi
          if [ "${{ github.event.inputs.with_long }}" = "true" ]; then
            ARGS="$ARGS --with-long"
          fi
          python run_gta6.py $ARGS

      - name: Read TikTok metadata
        id: tiktok_meta
        run: |
          META=$(ls output/gta6/*_tiktok_meta.json | head -1)
          if [ -f "$META" ]; then
            echo "url=$(jq -r '.tiktok_url' "$META")" >> "$GITHUB_OUTPUT"
            {
              echo "caption<<CAPTION_EOF"
              jq -r '.tiktok_caption' "$META"
              echo "CAPTION_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Email TikTok ready to post
        if: steps.tiktok_meta.outputs.url != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🎬 TikTok GTA6 prêt à poster"
          to: bobbylastronaute@gmail.com
          from: GTA6 Pipeline
          body: |
            Le TikTok du jour est prêt :
            ${{ steps.tiktok_meta.outputs.url }}

            Caption à copier-coller :
            ${{ steps.tiktok_meta.outputs.caption }}

      - name: Commit topic history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gta6_topics.json data/gta6_last_posts.json 2>/dev/null || true
          git diff --cached --quiet && exit 0
          git commit -m "chore: update GTA6 topic history + posts cache"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Retry $i..."
            git rebase --abort 2>/dev/null || true
            sleep $((i * 5))
          done

      - name: Upload videos
        uses: actions/upload-artifact@v4
        with:
          name: gta6-content-${{ github.run_id }}
          path: output/gta6/
          retention-days: 14
