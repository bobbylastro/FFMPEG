name: GTA 6 Content Pipeline

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Angle/sujet à privilégier (laisser vide pour auto)"
        required: false
        default: ""
      skip_long:
        description: "Passer la vidéo longue (plus rapide)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run GTA 6 pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            ARGS="--topic '${{ github.event.inputs.topic }}'"
          fi
          if [ "${{ github.event.inputs.skip_long }}" = "true" ]; then
            ARGS="$ARGS --no-long"
          fi
          python run_gta6.py $ARGS

      - name: Upload videos
        uses: actions/upload-artifact@v4
        with:
          name: gta6-content-${{ github.run_id }}
          path: output/gta6/
          retention-days: 14
