name: Bootstrap Analytics (one-time)

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run bootstrap
        env:
          YOUTUBE_TOKEN_VALORANT:          ${{ secrets.YOUTUBE_TOKEN_VALORANT }}
          YOUTUBE_TOKEN_COUNTER_STRIKE_2:  ${{ secrets.YOUTUBE_TOKEN_COUNTER_STRIKE_2 }}
          YOUTUBE_TOKEN_LEAGUE_OF_LEGENDS: ${{ secrets.YOUTUBE_TOKEN_LEAGUE_OF_LEGENDS }}
          YOUTUBE_TOKEN_APEX_LEGENDS:      ${{ secrets.YOUTUBE_TOKEN_APEX_LEGENDS }}
          YOUTUBE_TOKEN_ROCKET_LEAGUE:     ${{ secrets.YOUTUBE_TOKEN_ROCKET_LEAGUE }}
          YOUTUBE_TOKEN_R6_SIEGE:          ${{ secrets.YOUTUBE_TOKEN_R6_SIEGE }}
        run: python bootstrap_analytics.py

      - name: Regenerate dashboard
        run: python -c "from src.generate_dashboard import generate; generate()"

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/analytics/ docs/
          git diff --cached --quiet && exit 0
          git commit -m "chore: bootstrap analytics data for all games"
          git push
