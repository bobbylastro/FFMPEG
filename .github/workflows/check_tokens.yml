name: Check YouTube Tokens

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Check all tokens
        env:
          YOUTUBE_TOKEN_R6_SIEGE: ${{ secrets.YOUTUBE_TOKEN_R6_SIEGE }}
        run: python check_tokens.py
