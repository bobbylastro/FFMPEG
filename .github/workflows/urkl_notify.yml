name: URKL TikTok Email Notification

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "R2 public URL of the compiled video"
        required: true
      caption:
        description: "TikTok caption (pre-generated)"
        required: true
      clip_count:
        description: "Number of clips in the compilation"
        required: false
        default: "?"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🤖 URKL — ${{ github.event.inputs.clip_count }} clips prêts à poster"
          to: bobbylastronaute@gmail.com
          from: URKL Pipeline
          body: |
            🤖 Compilation URKL prête — ${{ github.event.inputs.clip_count }} clips

            Ouvre ce lien sur ton iPhone pour enregistrer dans Photos :
            ${{ github.event.inputs.video_url }}

            Caption TikTok :
            ${{ github.event.inputs.caption }}
