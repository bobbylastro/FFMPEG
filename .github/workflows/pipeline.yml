name: Clip Pipeline

on:
  workflow_dispatch:
    inputs:
      game:
        description: "Game slug (laisser vide pour tous les jeux)"
        required: false
        default: ""
      exclude:
        description: "Slugs à exclure, séparés par des virgules (ex: valorant,apex-legends)"
        required: false
        default: ""

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - game: valorant
            min_offset: 0
          - game: marvel-rivals
            min_offset: 10
          - game: the-finals
            min_offset: 20
          - game: apex-legends
            min_offset: 30
          - game: rocket-league
            min_offset: 40
          - game: r6-siege
            min_offset: 50

    steps:
      - id: gate
        run: |
          SKIP=false
          if [ -n "${{ github.event.inputs.game }}" ] && [ "${{ github.event.inputs.game }}" != "${{ matrix.game }}" ]; then
            SKIP=true
          fi
          if [ -n "${{ github.event.inputs.exclude }}" ]; then
            IFS=',' read -ra EXCLUDES <<< "${{ github.event.inputs.exclude }}"
            for ex in "${EXCLUDES[@]}"; do
              if [ "$(echo $ex | tr -d ' ')" = "${{ matrix.game }}" ]; then
                SKIP=true
              fi
            done
          fi
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"

      - name: Wait (stagger jobs by 10min)
        if: steps.gate.outputs.skip != 'true' && matrix.min_offset > 0 && github.event.inputs.game == ''
        run: sleep $(( ${{ matrix.min_offset }} * 60 ))

      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != 'true'

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.skip != 'true'
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system deps (ffmpeg)
        if: steps.gate.outputs.skip != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python deps
        if: steps.gate.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Restore Medal cookies
        if: steps.gate.outputs.skip != 'true'
        run: echo "${{ secrets.MEDAL_COOKIES }}" | base64 -d > medal_cookies.txt

      - name: Run pipeline — ${{ matrix.game }} (process only)
        if: steps.gate.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITCH_CLIENT_ID:     ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          YOUTUBE_TOKEN_VALORANT:          ${{ secrets.YOUTUBE_TOKEN_VALORANT }}
          YOUTUBE_TOKEN_MARVEL_RIVALS:     ${{ secrets.YOUTUBE_TOKEN_COUNTER_STRIKE_2 }}
          YOUTUBE_TOKEN_THE_FINALS:        ${{ secrets.YOUTUBE_TOKEN_LEAGUE_OF_LEGENDS }}
          YOUTUBE_TOKEN_APEX_LEGENDS:      ${{ secrets.YOUTUBE_TOKEN_APEX_LEGENDS }}
          YOUTUBE_TOKEN_ROCKET_LEAGUE:     ${{ secrets.YOUTUBE_TOKEN_ROCKET_LEAGUE }}
          YOUTUBE_TOKEN_R6_SIEGE:          ${{ secrets.YOUTUBE_TOKEN_R6_SIEGE }}
        run: python run_pipeline.py --game ${{ matrix.game }} --no-upload

      - name: Commit used clips history
        if: steps.gate.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/used_clips/ data/episode_counter/ data/analytics/
          git diff --cached --quiet && exit 0
          git commit -m "chore: update clip history & episode counter [${{ matrix.game }}]"
          git stash 2>/dev/null || true
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Retry $i..."
            git rebase --abort 2>/dev/null || true
            sleep $((i * 5))
          done

      - name: Upload to YouTube — ${{ matrix.game }}
        if: steps.gate.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITCH_CLIENT_ID:     ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          YOUTUBE_TOKEN_VALORANT:          ${{ secrets.YOUTUBE_TOKEN_VALORANT }}
          YOUTUBE_TOKEN_MARVEL_RIVALS:     ${{ secrets.YOUTUBE_TOKEN_COUNTER_STRIKE_2 }}
          YOUTUBE_TOKEN_THE_FINALS:        ${{ secrets.YOUTUBE_TOKEN_LEAGUE_OF_LEGENDS }}
          YOUTUBE_TOKEN_APEX_LEGENDS:      ${{ secrets.YOUTUBE_TOKEN_APEX_LEGENDS }}
          YOUTUBE_TOKEN_ROCKET_LEAGUE:     ${{ secrets.YOUTUBE_TOKEN_ROCKET_LEAGUE }}
          YOUTUBE_TOKEN_R6_SIEGE:          ${{ secrets.YOUTUBE_TOKEN_R6_SIEGE }}
        run: python run_pipeline.py --game ${{ matrix.game }} --upload-only

      - name: Upload outputs
        if: steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ matrix.game }}-${{ github.run_id }}
          path: |
            output/content_*.json
            output/thumbnails/
            output/long/*_compilation.mp4
            output/shorts/
          retention-days: 7
