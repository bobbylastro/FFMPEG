name: URKL Pipeline (détection IA + upload R2)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "URL YouTube de la vidéo/stream à analyser"
        required: true
      rounds_spec:
        description: "Plages de rounds, ex: 48:00-56:00,1:08:00-1:16:00 (vide = toute la vidéo)"
        required: false
        default: ""
      whisper_model:
        description: "Modèle Whisper (tiny|base|small|medium|large)"
        required: false
        default: "small"

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system deps (ffmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: |
          pip install -r requirements.txt
          pip install openai-whisper

      - name: Cache modèle Whisper
        uses: actions/cache@v4
        with:
          path: ~/.cache/whisper
          key: whisper-${{ github.event.inputs.whisper_model }}

      - name: Écrire les cookies YouTube
        run: |
          mkdir -p data
          printf '%s' "${{ secrets.URKL_YT_COOKIES }}" > data/yt_cookies.txt

      - name: Lancer le pipeline URKL
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          R2_ACCESS_KEY:     ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY:     ${{ secrets.R2_SECRET_KEY }}
        run: |
          python3 src/urkl_pipeline.py "${{ github.event.inputs.video_url }}" "${{ github.event.inputs.rounds_spec }}" "${{ github.event.inputs.whisper_model }}"

      - name: Commit des moments détectés
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/urkl_moments.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: urkl_moments.json — run pipeline IA [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Retry $i..."
            git rebase --abort 2>/dev/null || true
            sleep $((i * 5))
          done
